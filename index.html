<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gig:#2a5c14;--gig-mid:#3a7d1e;--gig-light:#e8f5e0;--gig-xlight:#f4faf0;
  --bg:#f2f4f0;--surf:#fff;--surf2:#f8faf6;--bdr:#dde0d8;--bdr2:#b8bdb0;
  --tx:#1a1e17;--txm:#6b7263;--txl:#9aa392;
  --red:#b93328;--red-bg:#fdf0ef;--red-bdr:#f5c0bb;
  --ylw:#8a6200;--ylw-bg:#fffbec;--ylw-bdr:#edd98a;
  --grn:#1a6b2a;--grn-bg:#edf7f0;--grn-bdr:#a8d9b4;
  --blue:#1a4fbf;--blue-bg:#e8f1ff;
  --r:8px;--rl:12px;
}
body{font-family:'Barlow','Segoe UI',system-ui,-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}
.hdr{background:linear-gradient(135deg,#2a5018 0%,#3a7020 45%,#4a8f28 100%);position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.hdr-inner{display:flex;align-items:center;gap:16px;padding:8px 20px}
.hdr-logo{height:50px;width:auto;mix-blend-mode:screen;opacity:0.85}
.hdr-title{font-family:'Barlow Condensed','Segoe UI Semibold','Segoe UI',system-ui,sans-serif;font-size:21px;font-weight:700;color:#fff;letter-spacing:.05em;text-transform:uppercase;opacity:.9;flex:1}
.hdr-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.leg{display:flex;gap:12px;align-items:center;font-size:11px;color:rgba(255,255,255,.7)}
.leg-i{display:flex;align-items:center;gap:4px}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.hbtn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 14px;border-radius:var(--r);font-family:'Barlow','Segoe UI',system-ui,-apple-system,sans-serif;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.hbtn:hover{background:rgba(255,255,255,.25)}
.hbtn.p{background:rgba(255,255,255,.9);color:var(--gig)}
.hbtn.p:hover{background:#fff}
.lbtn{background:var(--gig-light);border:1px solid var(--gig);color:var(--gig);padding:6px 14px;border-radius:var(--r);font-family:'Barlow','Segoe UI',system-ui,-apple-system,sans-serif;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.lbtn:hover{background:#d4edbe}
.lbtn.grey{background:#f0f2ee;border:1px solid var(--bdr2);color:var(--txm)}
.lbtn.grey:hover{background:#e4e8e0}
.tabs-bar{background:#1a3a0a;padding:0 20px;display:flex;gap:2px;align-items:flex-end;overflow-x:auto;scrollbar-width:none}
.tabs-bar::-webkit-scrollbar{display:none}
.tab-btn{font-family:'Barlow Condensed','Segoe UI Semibold','Segoe UI',system-ui,sans-serif;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:8px 16px;border:none;background:transparent;color:rgba(255,255,255,.5);cursor:pointer;border-radius:5px 5px 0 0;transition:all .15s;white-space:nowrap}
.tab-btn:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.8)}
.tab-btn.active{background:var(--bg);color:var(--gig)}
.tab-btn.dtab{color:rgba(255,200,50,.7)}
.tab-btn.dtab.active{color:#8a6200}
.tab-btn.mytab{color:rgba(150,220,255,.8)}
.tab-btn.mytab.active{color:#1a4fbf}
.add-tab-btn{background:transparent;border:none;color:rgba(255,255,255,.35);font-size:18px;padding:8px 10px;cursor:pointer;transition:color .15s;margin-bottom:2px;line-height:1}
.add-tab-btn:hover{color:rgba(255,255,255,.75)}
.main{padding:20px;max-width:1700px;margin:0 auto}
.tab-hdr-card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rl);padding:14px 20px;margin-bottom:16px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.07);flex-wrap:wrap}
.tab-hdr-name{font-family:'Barlow Condensed','Segoe UI Semibold','Segoe UI',system-ui,sans-serif;font-size:22px;font-weight:700;color:var(--gig);letter-spacing:.03em;text-transform:uppercase}
.tab-hdr-meta{font-size:11px;color:var(--txm);margin-top:1px}
.tab-hdr-meta b{color:var(--tx)}
.tab-hdr-actions{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:16px}
.stat-card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:10px 14px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.stat-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--txm);margin-bottom:3px}
.stat-val{font-size:24px;font-weight:700;font-family:'Barlow Condensed','Segoe UI Semibold','Segoe UI',system-ui,sans-serif}
.stat-card.danger .stat-val{color:var(--red)}
.stat-card.warning .stat-val{color:var(--ylw)}
.stat-card.success .stat-val{color:var(--grn)}
.filter-bar{display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
.search-inp{font-family:'Barlow','Segoe UI',system-ui,-apple-system,sans-serif;font-size:13px;border:1px solid var(--bdr);border-radius:var(--r);padding:6px 10px;background:var(--surf);color:var(--tx);flex:1;min-width:160px;max-width:260px}
.search-inp:focus{outline:none;border-color:var(--gig-mid)}
.flt-sel{font-family:'Barlow','Segoe UI',system-ui,-apple-system,sans-serif;font-size:12px;border:1px solid var(--bdr);border-radius:var(--r);padding:6px 8px;background:var(--surf);color:var(--txm);cursor:pointer}
.bucket-section{margin-bottom:22px}
.bucket-hdr{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--gig);color:#fff;border-radius:var(--r) var(--r) 0 0;cursor:pointer;user-select:none}
.bucket-title{font-family:'Barlow Condensed','Segoe UI Semibold','Segoe UI',system-ui,sans-serif;font-size:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.bucket-count{background:rgba(255,255,255,.2);border-radius:10px;padding:1px 8px;font-size:11px;font-weight:600}
.bucket-spacer{flex:1}
.bucket-hdr-btns{display:flex;gap:4px}
.bkt-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Barlow','Segoe UI',system-ui,-apple-system,sans-serif;white-space:nowrap}
.bkt-btn:hover{background:rgba(255,255,255,.28)}
.bucket-body{background:var(--surf);border:1px solid var(--bdr);border-top:none;border-radius:0 0 var(--r) var(--r);overflow:hidden}
.bucket-collapsed .bucket-body{display:none}
.task-table{width:100%;border-collapse:collapse;font-size:13px}
.task-table thead tr{background:var(--surf2);border-bottom:1px solid var(--bdr)}
.task-table th{padding:7px 10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--txm);white-space:nowrap;cursor:pointer;user-select:none}
.task-table th:hover{color:var(--tx)}
.task-table td{padding:9px 10px;border-bottom:1px solid var(--bdr);vertical-align:top}
.task-table tbody tr:last-child td{border-bottom:none}
.task-table tbody tr:hover{background:var(--gig-xlight)}

.task-table tbody tr.subtask-row td{background:#fbfcfa;border-bottom:1px solid #e8ebe2}
.task-table tbody tr.subtask-row:hover td{background:#f4faf0}
.subtask-indent{display:flex;align-items:flex-start;gap:7px;padding-left:18px}
.subtask-indent::before{content:'↳';color:var(--txl);font-weight:700;margin-top:1px}
.subtask-chip{display:inline-block;margin-top:4px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--blue);background:var(--blue-bg);border:1px solid #b9c7f2;border-radius:999px;padding:1px 6px}
.subtask-count{display:inline-block;margin-left:6px;font-size:10px;color:var(--blue);background:var(--blue-bg);border:1px solid #b9c7f2;border-radius:999px;padding:1px 6px;font-weight:700}
.inline-subtask-btn{display:inline-flex;align-items:center;gap:4px;margin-top:6px;padding:3px 9px;border-radius:999px;border:1px solid #b9c7f2;background:var(--blue-bg);color:var(--blue);font-family:'Barlow','Segoe UI',system-ui,-apple-system,sans-serif;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
.inline-subtask-btn:hover{background:#dfe8ff;border-color:#8fa7ec;color:#173f9f}
.subtask-add-btn{width:auto;min-width:70px;padding:0 8px;font-size:11px;font-weight:700;color:var(--blue);background:var(--blue-bg);border-color:#b9c7f2}
.subtask-add-btn:hover{background:#dfe8ff;border-color:#8fa7ec;color:#173f9f}
.cust-name{font-weight:600}
.sub-note{color:var(--txm);font-size:11px;margin-top:2px;line-height:1.4}
.due-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.due-overdue{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bdr)}
.due-soon{background:var(--ylw-bg);color:var(--ylw);border:1px solid var(--ylw-bdr)}
.due-ok{background:var(--grn-bg);color:var(--grn);border:1px solid var(--grn-bdr)}
.due-na{background:#f0f0f0;color:var(--txm);border:1px solid var(--bdr)}
.status-pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.s-ongoing{background:#e8f1ff;color:#1a4fbf}
.s-complete{background:var(--grn-bg);color:var(--grn)}
.s-hold{background:#f5f0ff;color:#6b3db5}
.s-planned{background:#fff8e0;color:#8a6500}
.s-delayed{background:var(--red-bg);color:var(--red)}
.s-other{background:#f0f0f0;color:var(--txm)}
.resp-chip{font-size:11px;font-weight:600;color:var(--gig);background:var(--gig-light);padding:2px 7px;border-radius:4px;display:inline-block}
/* PRIORITY */
.pri-high{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;color:#b93328;background:#fdf0ef;border:1px solid #f5c0bb;padding:2px 7px;border-radius:4px}
.pri-med{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;color:#8a6200;background:#fffbec;border:1px solid #edd98a;padding:2px 7px;border-radius:4px}
.pri-low{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;color:var(--txm);background:#f0f0f0;border:1px solid var(--bdr);padding:2px 7px;border-radius:4px}
.pri-none{display:inline-flex;align-items:center;font-size:11px;color:var(--txl);padding:2px 7px}
/* CHANGE LOG */
.changelog{margin-top:6px;border-top:1px solid var(--bdr);padding-top:6px}
.changelog-entry{font-size:11px;color:var(--txm);padding:2px 0;display:flex;gap:6px}
.changelog-time{color:var(--txl);white-space:nowrap;flex-shrink:0}
.row-acts{display:flex;gap:3px;opacity:0;transition:opacity .1s}
.task-table tbody tr:hover .row-acts{opacity:1}
.icon-btn{background:none;border:1px solid var(--bdr);border-radius:4px;width:24px;height:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--txm)}
.icon-btn:hover{background:var(--surf2);border-color:var(--bdr2);color:var(--tx)}
.icon-btn.del:hover{background:var(--red-bg);border-color:var(--red-bdr);color:var(--red)}
.empty-state{padding:24px;text-align:center;color:var(--txl);font-size:13px}
/* AUTOCOMPLETE */
.ac-wrap{position:relative}
.ac-list{position:absolute;top:100%;left:0;right:0;background:var(--surf);border:1px solid var(--bdr2);border-radius:0 0 var(--r) var(--r);z-index:300;max-height:160px;overflow-y:auto;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.ac-item{padding:7px 10px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--bdr)}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item.active{background:var(--gig-light);color:var(--gig)}
/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:var(--surf);border-radius:var(--rl);padding:24px;width:100%;max-width:620px;box-shadow:0 8px 32px rgba(0,0,0,.15);margin:auto}
.modal-title{font-family:'Barlow Condensed','Segoe UI Semibold','Segoe UI',system-ui,sans-serif;font-size:18px;font-weight:700;color:var(--gig);margin-bottom:18px;text-transform:uppercase;letter-spacing:.05em}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid .full{grid-column:1/-1}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--txm)}
.form-input,.form-select,.form-textarea{font-family:'Barlow','Segoe UI',system-ui,-apple-system,sans-serif;font-size:13px;border:1px solid var(--bdr);border-radius:var(--r);padding:7px 9px;background:var(--surf);color:var(--tx);width:100%}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--gig-mid);box-shadow:0 0 0 2px rgba(58,125,30,.1)}
.form-textarea{resize:vertical;min-height:70px}
.modal-acts{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap}
.btn-cancel{background:none;border:1px solid var(--bdr);color:var(--txm);padding:7px 18px;border-radius:var(--r);font-family:'Barlow','Segoe UI',system-ui,-apple-system,sans-serif;font-size:13px;font-weight:600;cursor:pointer}
.btn-save{background:var(--gig);border:1px solid var(--gig);color:#fff;padding:7px 22px;border-radius:var(--r);font-family:'Barlow','Segoe UI',system-ui,-apple-system,sans-serif;font-size:13px;font-weight:700;cursor:pointer}
.btn-save:hover{background:var(--gig-mid)}
/* CONFIG */
.config-section{margin-bottom:20px}
.config-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--txm);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--bdr)}
.config-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.config-item{display:flex;align-items:center;gap:8px;background:var(--surf2);border:1px solid var(--bdr);border-radius:var(--r);padding:6px 10px;font-size:13px}
.config-item-name{flex:1;font-weight:500}
.config-item-type{font-size:11px;color:var(--txm);background:#f0f0f0;padding:1px 6px;border-radius:3px}
.config-item.dragging{opacity:.5;border-style:dashed}
.config-drag-handle{font-size:14px;color:var(--txm);cursor:grab;line-height:1}
.config-move-btn{border:1px solid var(--bdr);background:var(--surf);color:var(--txm);border-radius:5px;font-size:11px;padding:2px 6px;cursor:pointer}
.config-move-btn:disabled{opacity:.35;cursor:not-allowed}
.config-subhint{font-size:11px;color:var(--txm);line-height:1.35;margin:-2px 0 8px}
.audit-log{display:flex;flex-direction:column;gap:5px;max-height:150px;overflow:auto}
.audit-entry{font-size:11px;color:var(--txm);background:var(--surf2);border:1px solid var(--bdr);border-radius:var(--r);padding:6px 8px;line-height:1.35}
.audit-entry strong{color:var(--tx)}
.config-add-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.config-inp{font-family:'Barlow','Segoe UI',system-ui,-apple-system,sans-serif;font-size:12px;border:1px solid var(--bdr);border-radius:var(--r);padding:5px 8px;background:var(--surf);color:var(--tx);flex:1;min-width:100px}
.config-sel{font-family:'Barlow','Segoe UI',system-ui,-apple-system,sans-serif;font-size:12px;border:1px solid var(--bdr);border-radius:var(--r);padding:5px 7px;background:var(--surf);color:var(--txm)}
.config-add-btn{background:var(--gig);color:#fff;border:none;padding:5px 14px;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;font-family:'Barlow','Segoe UI',system-ui,-apple-system,sans-serif;white-space:nowrap}
.reset-link{font-size:11px;color:var(--txm);cursor:pointer;text-decoration:underline;margin-top:4px;display:inline-block}
.reset-link:hover{color:var(--red)}
/* DASHBOARD */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;margin-bottom:20px}
.dash-card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rl);padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.dash-card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--txm);margin-bottom:12px}
.chart-wrap{position:relative;height:180px}
.dash-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
.dash-stat{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:10px 14px;text-align:center}
.dash-stat-val{font-size:28px;font-weight:700;font-family:'Barlow Condensed','Segoe UI Semibold','Segoe UI',system-ui,sans-serif}
.dash-stat-lbl{font-size:10px;color:var(--txm);text-transform:uppercase;letter-spacing:.07em;font-weight:600;margin-top:2px}
.dash-stat.danger .dash-stat-val{color:var(--red)}
.dash-stat.warning .dash-stat-val{color:var(--ylw)}
.dash-stat.success .dash-stat-val{color:var(--grn)}
.dash-filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.dash-table-wrap{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rl);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.dash-table{width:100%;border-collapse:collapse;font-size:12px}
.dash-table thead tr{background:var(--surf2);border-bottom:1px solid var(--bdr)}
.dash-table th{padding:7px 10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--txm);white-space:nowrap}
.dash-table td{padding:8px 10px;border-bottom:1px solid var(--bdr);vertical-align:middle}
.dash-table tbody tr:last-child td{border-bottom:none}
.dash-table tbody tr:hover{background:var(--gig-xlight)}
.pm-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;background:var(--gig-light);color:var(--gig)}
/* MY TASKS */
.my-tasks-header{font-family:'Barlow Condensed','Segoe UI Semibold','Segoe UI',system-ui,sans-serif;font-size:22px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.03em;margin-bottom:16px}
.mytasks-name-bar{display:flex;gap:10px;align-items:center;background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rl);padding:14px 20px;margin-bottom:16px;flex-wrap:wrap}
.mytasks-name-bar label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--txm)}
/* EXPORT BTN */
.export-btn{background:#f0f2ee;border:1px solid var(--bdr2);color:var(--txm);padding:6px 14px;border-radius:var(--r);font-family:'Barlow','Segoe UI',system-ui,-apple-system,sans-serif;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.export-btn:hover{background:#e4e8e0;color:var(--tx)}
/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--gig);color:#fff;padding:10px 18px;border-radius:var(--r);font-size:13px;font-weight:600;box-shadow:0 4px 14px rgba(0,0,0,.2);z-index:999;transform:translateY(70px);opacity:0;transition:all .25s}
.toast.show{transform:translateY(0);opacity:1}
/* SORT INDICATOR */
.sort-asc::after{content:' ▲';font-size:9px}
.sort-desc::after{content:' ▼';font-size:9px}
/* Row interaction */
.task-table tbody tr{cursor:pointer}
.task-table tbody tr.dbl-hint{position:relative}
/* Mobile action sheet */
.action-sheet-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:600;align-items:flex-end;justify-content:center}
.action-sheet-overlay.open{display:flex}
.action-sheet{background:var(--surf);border-radius:var(--rl) var(--rl) 0 0;width:100%;max-width:480px;padding:8px 0 32px;box-shadow:0 -4px 24px rgba(0,0,0,.15)}
.action-sheet-title{font-size:13px;font-weight:700;color:var(--txm);text-align:center;padding:12px 20px 8px;border-bottom:1px solid var(--bdr);margin-bottom:4px}
.action-sheet-btn{display:flex;align-items:center;gap:14px;width:100%;padding:15px 24px;font-family:'Barlow','Segoe UI',system-ui,-apple-system,sans-serif;font-size:15px;font-weight:600;background:none;border:none;cursor:pointer;color:var(--tx);text-align:left}
.action-sheet-btn:hover{background:var(--surf2)}
.action-sheet-btn.danger{color:var(--red)}
.action-sheet-btn .as-icon{font-size:20px;width:28px;text-align:center}
.action-sheet-cancel{display:block;margin:8px 16px 0;padding:14px;background:var(--surf2);border:none;border-radius:var(--r);font-family:'Barlow','Segoe UI',system-ui,-apple-system,sans-serif;font-size:15px;font-weight:700;color:var(--txm);cursor:pointer;width:calc(100% - 32px);text-align:center}
.action-sheet-cancel:hover{background:var(--bdr)}
/* Desktop double-click hint */
.customer-line{display:flex;align-items:center;gap:8px;min-width:0}
.customer-line .cust-name{min-width:0}
.dbl-edit-hint{display:none;font-size:9px;color:var(--txl);font-style:italic;font-weight:500;white-space:nowrap;flex:0 0 auto}
@media(hover:hover){
  .task-table tbody tr:hover .dbl-edit-hint{display:inline-flex}
}
@media(max-width:700px){
  .hdr-inner{flex-wrap:wrap;padding:8px 12px}
  .hdr-title{font-size:14px}
  .leg{display:none}
  .main{padding:12px}
  .form-grid{grid-template-columns:1fr}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .dash-stats{grid-template-columns:repeat(2,1fr)}
  .task-table th:nth-child(n+5),.task-table td:nth-child(n+5){display:none}
  .tab-btn{font-size:11px;padding:7px 10px}
  .tab-hdr-card{flex-direction:column;align-items:flex-start}
  .tab-hdr-actions{margin-left:0;width:100%}
  .dash-grid{grid-template-columns:1fr}
  .modal{margin:0;border-radius:var(--rl) var(--rl) 0 0;position:fixed;bottom:0;left:0;right:0;max-width:100%}
  .modal-overlay{align-items:flex-end;padding:0}
}

.save-ind{position:fixed;top:10px;right:16px;background:var(--gig);color:#fff;font-size:11px;font-weight:600;padding:4px 14px;border-radius:20px;z-index:400;opacity:0;transition:opacity .5s;pointer-events:none}
.sync-wrap{display:flex;align-items:center;gap:8px}
.sync-status{display:flex;align-items:center;gap:3px;min-width:60px}
.user-chip{font-size:11px;color:rgba(255,255,255,.8);cursor:pointer;padding:5px 11px;border-radius:20px;border:1px solid rgba(255,255,255,.25);white-space:nowrap;background:rgba(255,255,255,.08)}
.user-chip:hover{background:rgba(255,255,255,.18)}
.admin-tools{display:none;align-items:center;gap:6px}
.admin-tools.unlocked{display:flex}
.banner{display:none;padding:9px 20px;font-size:12px;font-weight:600;align-items:center;gap:8px;flex-wrap:wrap;border-bottom:2px solid}
.banner-update{background:#4a9a20;border-color:#3a7a18;color:#fff;box-shadow:0 2px 10px rgba(0,0,0,.2)}


.app-ver-link{font-size:10px;opacity:.55;font-weight:500;letter-spacing:.03em;vertical-align:middle;cursor:pointer;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:2px}
.app-ver-link:hover{opacity:.9;color:#fff}
.tabs-bar{position:relative;z-index:1;box-shadow:0 2px 6px rgba(0,0,0,.18)}
.task-table th.cust-col,.task-table td.cust-col{min-width:180px;width:22%;max-width:320px}
.changelog-list{display:flex;flex-direction:column;gap:12px;max-height:62vh;overflow-y:auto;padding-right:4px}
.changelog-entry{border:1px solid var(--bdr);border-radius:var(--r);background:var(--surf2);padding:12px 14px}
.changelog-entry-title{font-size:13px;font-weight:800;color:var(--gig);margin-bottom:4px}
.changelog-entry-meta{font-size:11px;color:var(--txm);margin-bottom:8px}
.changelog-entry ul{margin-left:18px;color:var(--tx);font-size:12px;line-height:1.45}
.changelog-note{font-size:12px;color:var(--txm);line-height:1.45;margin-bottom:12px}

/* Windows ClearType / font rendering improvements */
@media screen and (-webkit-min-device-pixel-ratio: 0) {
  * { -webkit-font-smoothing: antialiased; }
}
input, select, textarea, button {
  font-family: 'Barlow','Segoe UI',system-ui,-apple-system,sans-serif;
}
</style>

// ── FIREBASE REST HELPERS ──────────────────────────────────────────
function fbUrl(node) {
  return FB_DB_URL + '/' + node + '.json?auth=' + FB_API_KEY;
}

function fbRead() {
  return fetch(fbUrl(DATA_NODE), { method: 'GET' })
    .then(function(res) {
      if (!res.ok) throw new Error('Read failed: HTTP ' + res.status);
      return res.json();
    })
    .then(function(raw) {
      if (!raw) return null;
      // Unwrap: if stored as {d: "...", v, ts, savedBy} format, parse the inner string
      if (raw.d && typeof raw.d === 'string') {
        try {
          var inner = JSON.parse(raw.d);
          inner.v = raw.v || inner.v;
          inner.ts = raw.ts || inner.ts;
          inner.savedBy = raw.savedBy || inner.savedBy;
          return inner;
        } catch(e) { return raw; }
      }
      return raw;
    });
}

function fbWrite(data) {
  // Wrap in {d: "..."} — stores entire state as a single JSON string
  // This avoids Firebase key restrictions (no . # $ [ ] / in keys)
  var wrapped = { d: JSON.stringify(data), v: data.v, ts: data.ts, savedBy: data.savedBy };
  return fetch(fbUrl(DATA_NODE), {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(wrapped)
  }).then(function(res) {
    if (!res.ok) {
      return res.text().then(function(t) {
        throw new Error('Write failed: HTTP ' + res.status + ' — ' + t);
      });
    }
    return res.json();
  });
}

// ── REAL-TIME STREAMING (Server-Sent Events) ───────────────────────
// Firebase REST supports SSE for live updates — no SDK needed
function attachStream() {
  if (!window.EventSource) {
    // Browser doesn't support SSE — fall back to polling every 15s
    console.log('SSE not supported, using polling');
    setInterval(pollForUpdates, 15000);
    return;
  }
  if (streamSource) { streamSource.close(); streamSource = null; }

  var url = FB_DB_URL + '/' + STREAM_NODE + '.json'; // no auth needed with open rules
  try {
    streamSource = new EventSource(url);
    streamSource.addEventListener('put', function(e) {
      if (!appReady) return;
      if (ignoreNextStream) { ignoreNextStream = false; return; }
      try {
        var msg = JSON.parse(e.data);
        if (!msg || !msg.data) return;
        var remote = msg.data;
        // Unwrap if stored in wrapped format
        if (remote.d && typeof remote.d === 'string') {
          try {
            var inner = JSON.parse(remote.d);
            inner.v = remote.v || inner.v;
            inner.ts = remote.ts || inner.ts;
            inner.savedBy = remote.savedBy || inner.savedBy;
            remote = inner;
          } catch(e2) {}
        }
        if (!remote.tabs) return;
        if (remote.v <= localVersion) return;
        showUpdateBanner(remote);
      } catch(ex) { console.warn('Stream parse error:', ex); }
    });
    streamSource.addEventListener('cancel', function() {
      console.warn('Firebase stream cancelled — reconnecting in 5s');
      setTimeout(attachStream, 5000);
    });
    streamSource.onerror = function() {
      console.warn('Firebase stream error — reconnecting in 10s');
      if (streamSource) { streamSource.close(); streamSource = null; }
      setTimeout(attachStream, 10000);
    };
    console.log('Firebase SSE stream attached');
  } catch(ex) {
    console.warn('Could not attach stream:', ex);
    setInterval(pollForUpdates, 15000);
  }
}

function pollForUpdates() {
  if (!appReady || ignoreNextStream) return;
  fbRead().then(function(remote) {
    if (!remote || !remote.tabs) return;
    if (remote.v <= localVersion) return;
    showUpdateBanner(remote);
  }).catch(function() {});
}

// ── STATE ──────────────────────────────────────────────────────────
function nowTs() {

    month:'2-digit', day:'2-digit', year:'numeric',
    hour:'2-digit', minute:'2-digit', hour12:true

function serializeState() {
  return {
    v: (localVersion || 0) + 1,
    ts: new Date().toISOString(),
    savedBy: currentUser || 'anonymous',
    tabs: state.tabs,
    tasks: state.tasks,

    tabCols: state.tabCols,
    tabBuckets: state.tabBuckets,
    tabHistory: state.tabHistory || [],
    auditLog: state.auditLog || []
  };
}

function applyRemoteState(remote) {
  if (!remote || !remote.tabs) return false;

  state.tasks      = remote.tasks      || {};
  state.timestamps = remote.timestamps || {};
  state.tabCols    = remote.tabCols    || {};
  state.tabBuckets = remote.tabBuckets || {};
  state.tabHistory = remote.tabHistory || [];
  state.auditLog   = remote.auditLog   || [];
  cloudVersion = remote.v || 0;
  localVersion = cloudVersion;
  if (!state.activeTab || state.tabs.indexOf(state.activeTab) === -1)
    state.activeTab = state.tabs[0];
  return true;
}

// ── PERSIST ────────────────────────────────────────────────────────

// ── REAL-TIME MERGE HELPERS ───────────────────────────────────────
function mergeStates(local, remote) {
  if (!remote || !remote.tabs) return local;

  var TASK_FIELDS = ['customer','notes','owner','support','status','due',
                     'priority','milestone','meetingNotes','subtasks'];
  var now = new Date().toISOString();
  var merged = JSON.parse(JSON.stringify(local || {})); // deep clone local

  // Helper: support both v11-style {ts, field/fields} and v10-style {t, msg}
  function entryTime(entry) {
    return new Date(entry.ts || entry.t || 0).getTime() || 0;
  }

  function taskLastChangedAt(task) {
    if (!task || !task.changelog || !task.changelog.length) return 0;
    var latest = 0;
    task.changelog.forEach(function(entry) {
      latest = Math.max(latest, entryTime(entry));
    });
    return latest;
  }

  function lastChangedAt(task, field) {
    if (!task || !task.changelog || !task.changelog.length) return 0;
    var latestForField = 0;
    for (var i = task.changelog.length - 1; i >= 0; i--) {
      var entry = task.changelog[i];
      if (entry.field === field || (entry.fields && entry.fields.indexOf(field) > -1)) {
        latestForField = Math.max(latestForField, entryTime(entry));
      }
    }
    // Existing v10 data usually has task-level changelog entries without fields.
    // Use task-level latest timestamp as a safe fallback so remote updates can still merge.
    return latestForField || taskLastChangedAt(task);
  }

  function buildIndex(tasksObj) {
    var idx = {};
    Object.keys(tasksObj || {}).forEach(function(tab) {
      Object.keys(tasksObj[tab] || {}).forEach(function(bucket) {
        (tasksObj[tab][bucket] || []).forEach(function(t) {
          if (t.id) idx[t.id] = { task: t, bucket: bucket, tab: tab };
          (t.subtasks || []).forEach(function(st) { if (st.id) idx[st.id] = { task: st, bucket: bucket, tab: tab, parentId: t.id, parent: t }; });
        });
      });
    });
    return idx;
  }

  if (!merged.tasks) merged.tasks = {};
  var localIdx  = buildIndex(local && local.tasks);
  var remoteIdx = buildIndex(remote.tasks);

  Object.keys(remoteIdx).forEach(function(id) {
    var rem = remoteIdx[id];
    var loc = localIdx[id];

    if (!loc) {
      var tab    = rem.tab;
      var bucket = rem.bucket;
      if (!merged.tasks[tab]) merged.tasks[tab] = {};
      if (!merged.tasks[tab][bucket]) merged.tasks[tab][bucket] = [];
      merged.tasks[tab][bucket].push(JSON.parse(JSON.stringify(rem.task)));
      return;
    }

    var localTask  = loc.task;
    var remoteTask = rem.task;
    var conflictFields = [];

    TASK_FIELDS.forEach(function(field) {
      var localVal  = localTask[field];
      var remoteVal = remoteTask[field];
      if (localVal === remoteVal) return;

      var localTs  = lastChangedAt(localTask, field);
      var remoteTs = lastChangedAt(remoteTask, field);

      if (remoteTs > localTs) {
        localTask[field] = remoteVal;
        conflictFields.push(field);
      }
    });

    if (conflictFields.length) {
      localTask.conflict = true;
      localTask.conflictFields = conflictFields;
      if (!localTask.changelog) localTask.changelog = [];
      localTask.changelog.push({
        t: now,
        ts: now,
        by: 'System',
        fields: conflictFields,
        msg: '⚠ Merge: remote update applied to ' + conflictFields.join(', '),
        note: '⚠ Merge: remote update applied to ' + conflictFields.join(', ')
      });
    }
  });

  Object.keys(localIdx).forEach(function(id) {
    if (!remoteIdx[id]) {
      var loc = localIdx[id];
      var localTask = loc.task;
      localTask.conflict = true;
      localTask.conflictFields = localTask.conflictFields || [];
      if (!localTask.changelog) localTask.changelog = [];
      localTask.changelog.push({
        t: now,
        ts: now,
        by: 'System',
        msg: '⚠ Conflict: this task was deleted remotely but has been restored. Review and delete manually if intended.',
        note: '⚠ Conflict: this task was deleted remotely but has been restored. Review and delete manually if intended.'
      });
    }
  });

  merged.tabs       = remote.tabs;
  merged.tabCols    = remote.tabCols    || merged.tabCols || {};
  merged.tabBuckets = remote.tabBuckets || merged.tabBuckets || {};
  merged.timestamps = remote.timestamps || merged.timestamps || {};
  merged.tabHistory = remote.tabHistory || merged.tabHistory || [];
  merged.auditLog   = remote.auditLog   || merged.auditLog   || [];
  merged.v          = remote.v;

  if (!merged.activeTab || merged.tabs.indexOf(merged.activeTab) === -1)
    merged.activeTab = merged.tabs[0];

  return merged;
}

function persist() {
  state.timestamps[state.activeTab] = nowTs();
  cacheSave(serializeState());
  var ind = document.getElementById('save-ind');
  if (ind) { ind.textContent = 'Saving...'; ind.style.opacity = '1'; }
  setSyncStatus('saving');
  clearTimeout(saveDebounce);
  saveDebounce = setTimeout(persistNow, 800);
}

function persistNow() {
  var payload = serializeState();
  payload.v = (localVersion || 0) + 1;
  ignoreNextStream = true;
  fbWrite(payload)
    .then(function() {
      localVersion = payload.v;
      cacheSave(payload);
      setSyncStatus('synced');
      var ind = document.getElementById('save-ind');
      if (ind) {
        ind.textContent = currentUser ? 'Saved by ' + currentUser : 'Saved';
        ind.style.opacity = '1';
        clearTimeout(saveIndTimer);
        saveIndTimer = setTimeout(function() {
          ind.style.opacity = '0';
          setSyncStatus('idle');
        }, 3000);
      }
    })
    .catch(function(err) {
      ignoreNextStream = false;
      setSyncStatus('offline', 'Offline');
      var ind = document.getElementById('save-ind');
      if (ind) { ind.textContent = 'Saved locally only'; ind.style.opacity = '1'; }
      console.warn('Firebase write failed:', err);
    });
}

// ── UPDATE BANNER ──────────────────────────────────────────────────
function showUpdateBanner(remoteData) {
  var el = document.getElementById('update-banner');
  if (!el) return;
  var who  = remoteData.savedBy || 'Someone';
  var when = remoteData.ts
    ? new Date(remoteData.ts).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})
    : 'just now';
  el.innerHTML = '<span>\u21BA ' + esc(who) + ' updated at ' + when + '</span>'
    + '<button onclick="acceptUpdate()" style="margin-left:12px;background:#fff;color:var(--gig);'
    + 'border:1px solid var(--gig);padding:3px 12px;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer">'
    + 'Load updates</button>'
    + '<button onclick="dismissUpdate()" style="margin-left:6px;background:none;border:none;'
    + 'color:var(--txm);font-size:18px;cursor:pointer;line-height:1">\u00D7</button>';
  el.style.display = 'flex';
  window._pendingRemote = remoteData;
}
function acceptUpdate() {
  if (window._pendingRemote) {
    var merged = mergeStates(state, window._pendingRemote);
    state = merged;
    localVersion = merged.v || localVersion;
    cloudVersion = localVersion;
    cacheSave(serializeState());
    dismissUpdate();
    renderApp();
    // Count any conflict-flagged tasks to inform the user
    var conflicts = 0;
    Object.keys(state.tasks || {}).forEach(function(tab) {
      Object.keys(state.tasks[tab] || {}).forEach(function(bucket) {
        (state.tasks[tab][bucket] || []).forEach(function(t) {
          if (t.conflict) conflicts++;
          (t.subtasks || []).forEach(function(st){ if(st.conflict) conflicts++; });
        });
      });
    });
    if (conflicts > 0) {
      showToast('Updates merged. ' + conflicts + ' task(s) had conflicts — look for ⚠ badges.');
    } else {
      showToast('Updates merged successfully.');
    }
  }
}
function dismissUpdate() {
  var el = document.getElementById('update-banner');
  if (el) el.style.display = 'none';
  if (window._pendingRemote) localVersion = window._pendingRemote.v;
}

// ── BACKUP / RESTORE ───────────────────────────────────────────────
function downloadBackup() {
  if (!requireAdminTools()) return;
  var payload = serializeState();
  payload.backupDate = new Date().toISOString();
  var json = JSON.stringify(payload, null, 2);
  var blob = new Blob([json], {type:'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'GI_Backup_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  showToast('Backup downloaded.');
}
function openRestoreDialog() {
  if (!requireAdminTools()) return;
  if (!confirm('Restore from a backup? This overwrites ALL current data for the entire team.')) return;
  if (!confirm('FINAL CHECK: this will replace the shared task tracker data for everyone. Continue?')) return;
  var inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.json';
  inp.onchange = function(e) {
    var file = e.target.files[0]; if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var data = JSON.parse(ev.target.result);
        if (!data.tabs || !data.tasks) { showToast('Invalid backup file.'); return; }
        data.v = (localVersion || 0) + 1;
        data.savedBy = currentUser || 'anonymous';
        data.ts = new Date().toISOString();
        fbWrite(data).then(function() {
          applyRemoteState(data);
          cacheSave(data);
          renderApp();
          showToast('Backup restored for entire team.');
        }).catch(function(err) {
          showToast('Restore failed: ' + err.message);
        });
      } catch(ex) { showToast('Could not read backup file.'); }
    };
    reader.readAsText(file);
  };
  inp.click();
}

// ── INIT ───────────────────────────────────────────────────────────
function initApp() {
  loadUserName();

  document.getElementById('appContent').innerHTML =
    '<div style="text-align:center;padding:80px 20px;color:var(--txm)">'
    + '<div style="font-size:36px;margin-bottom:16px;color:var(--gig)">&#9654;</div>'
    + '<div style="font-size:15px;font-weight:600;color:var(--gig)">Connecting to shared database...</div>'
    + '<div style="font-size:12px;margin-top:8px">Usually just a second</div>'
    + '</div>';

  fbRead()
    .then(function(remote) {
      if (remote && remote.tabs && remote.tabs.length) {
        // Data exists in cloud — use it
        applyRemoteState(remote);
        cacheSave(remote);
        setSyncStatus('synced');
        console.log('Loaded from Firebase: ' + remote.tabs.length + ' tabs, v=' + remote.v);
        finishInit();
      } else {
        // First ever load — seed default data and push to Firebase
        console.log('Firebase empty — seeding default data...');
        initDefault();
        var payload = serializeState();
        fbWrite(payload)
          .then(function() {
            localVersion = payload.v;
            cacheSave(payload);
            setSyncStatus('synced');
            showToast('Database initialized with all PM data.');
            console.log('Seed data pushed to Firebase successfully.');
          })
          .catch(function(err) {
            console.warn('Could not push seed data:', err);
            setSyncStatus('offline', 'Check Firebase rules');
            showToast('Connected but could not write — check Firebase rules.');
          });
        finishInit();
      }
    })
    .catch(function(err) {
      console.warn('Firebase read failed:', err);
      // Try local cache
      var cached = cacheLoad();
      if (cached && cached.tabs && cached.tabs.length) {
        applyRemoteState(cached);
        setSyncStatus('offline', 'Offline \u2014 cached');
        showToast('Running from local cache \u2014 changes will sync when reconnected.');
      } else {
        initDefault();
        setSyncStatus('offline', 'Offline');
        showToast('Could not connect. Check your internet connection.');
      }
      finishInit();
    });
}

function finishInit() {
  attachStream();
  appReady = true;
  updateUserChip();
  if (!currentUser) {
    openUserPrompt(function() {
      renderApp();
      updateUserChip();
    });
  } else {
    renderApp();
    updateUserChip();
  }
}

function getKnownNames(){
  var seen={};
  state.tabs.forEach(function(tab){
    getTabBuckets(tab).forEach(function(b){
      ((state.tasks[tab]||{})[b]||[]).forEach(function(t){
        ['owner','support'].forEach(function(k){

            var nm=n.trim(); if(nm.length>1) seen[nm.toLowerCase()]=nm;
          });
        });
      });
    });
  });
  return Object.values(seen).sort(function(a,b){return a.localeCompare(b);});
}

function makeAC(inp){
  if(!inp||inp._acDone) return;
  inp._acDone=true;
  var wrap=inp.parentNode;
  var list=document.createElement('div');
  list.className='ac-list';
  wrap.appendChild(list);
  var idx=-1;
  function show(names){
    list.innerHTML=''; idx=-1;
    if(!names.length){list.style.display='none';return;}
    names.slice(0,8).forEach(function(name){
      var item=document.createElement('div');
      item.className='ac-item'; item.textContent=name;
      item.addEventListener('mousedown',function(e){
        e.preventDefault(); inp.value=name; list.style.display='none'; inp.focus();
      });
      list.appendChild(item);
    });
    list.style.display='block';
  }
  inp.addEventListener('input',function(){
    var q=inp.value.trim().toLowerCase();
    if(q.length<1){list.style.display='none';return;}
    show(getKnownNames().filter(function(n){return n.toLowerCase().indexOf(q)>-1&&n.toLowerCase()!==q;}));
  });
  inp.addEventListener('keydown',function(e){
    var items=list.querySelectorAll('.ac-item');
    if(!items.length) return;
    if(e.key==='ArrowDown'){e.preventDefault();idx=Math.min(idx+1,items.length-1);items.forEach(function(el,i){el.classList.toggle('sel',i===idx);});}
    else if(e.key==='ArrowUp'){e.preventDefault();idx=Math.max(idx-1,0);items.forEach(function(el,i){el.classList.toggle('sel',i===idx);});}
    else if(e.key==='Enter'&&idx>=0){e.preventDefault();inp.value=items[idx].textContent;list.style.display='none';inp.focus();}
    else if(e.key==='Escape'){list.style.display='none';}
  });
  inp.addEventListener('blur',function(){setTimeout(function(){list.style.display='none';},200);});
}

function parseDue(s){if(!s)return null;var p=s.split('-');return new Date(+p[0],+p[1]-1,+p[2]);}
function dueClass(due){
  if(!due)return 'na';
  var d=parseDue(due),t=new Date();t.setHours(0,0,0,0);
  var diff=Math.floor((d-t)/86400000);
  return diff<0?'overdue':diff<=7?'soon':'ok';
}
function dueBadge(due){
  if(!due)return '<span class="due-badge due-na">No date</span>';
  var d=parseDue(due),t=new Date();t.setHours(0,0,0,0);
  var diff=Math.floor((d-t)/86400000);
  var lbl=d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  if(diff<0)return '<span class="due-badge due-overdue">&#9679; '+lbl+'</span>';
  if(diff<=7)return '<span class="due-badge due-soon">&#9679; '+lbl+'</span>';
  return '<span class="due-badge due-ok">&#9679; '+lbl+'</span>';
}
function statusPill(s){
  var m={'Ongoing':'s-ongoing','In Progress':'s-ongoing','In Process':'s-ongoing','Planned':'s-planned','Pending':'s-planned','Not Started':'s-planned','Idle':'s-planned','Scheduled':'s-planned','Complete':'s-complete','On Hold':'s-hold','Delayed':'s-delayed','Waiting on Response':'s-hold','High Priority':'s-delayed'};
  return '<span class="status-pill '+(m[s]||'s-other')+'">'+esc(s||'—')+'</span>';
}
function priTag(p){
  if(p==='High')return '<span class="pri-high">&#9650; High</span>';
  if(p==='Medium')return '<span class="pri-med">&#9654; Med</span>';
  if(p==='Low')return '<span class="pri-low">&#9660; Low</span>';
  return '<span class="pri-none">—</span>';
}
function priSort(p){return p==='High'?0:p==='Medium'?1:p==='Low'?2:3;}

function daysUntilDue(due){
  if(!due) return null;
  var d=parseDue(due),t=new Date();t.setHours(0,0,0,0);
  return Math.floor((d-t)/86400000);
}

function dueBadgeWithCountdown(due, status){
  if(!due) return '<span class="due-badge due-na">No date</span>';
  var diff=daysUntilDue(due);
  var d=parseDue(due);
  var lbl=d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  var badge='';
  if(diff<0) badge='<span class="due-badge due-overdue">&#9679; '+lbl+'</span>';
  else if(diff<=7) badge='<span class="due-badge due-soon">&#9679; '+lbl+'</span>';
  else badge='<span class="due-badge due-ok">&#9679; '+lbl+'</span>';
  // Countdown for non-complete active tasks
  if(status!=='Complete'&&diff!==null&&diff>=0&&diff<=14){
    var countdown=diff===0?'Due today':diff===1?'1 day left':diff+' days left';
    badge+=' <span style="font-size:10px;font-weight:700;color:'+(diff<=3?'var(--red)':diff<=7?'var(--ylw)':'var(--txm)')+'">'+countdown+'</span>';
  }
  return badge;
}

function completedDaysAgo(completedAt){
  if(!completedAt) return 999;
  // completedAt is a timestamp string like "05/06/2026, 10:30 AM"
  try{
    var d=new Date(completedAt);
    var t=new Date();t.setHours(0,0,0,0);
    return Math.floor((t-d)/86400000);
  }catch(e){return 0;}
}
function peopleCell(o,s){
  var h='';
  if(o)h+='<span class="owner-chip">'+esc(o)+'</span>';
  if(s)h+=(o?'<br>':'')+'<span class="support-chip">'+esc(s)+'</span>';
  if(!o&&!s)h='<span style="color:var(--txl);font-size:11px">—</span>';
  return h;
}
function getStats(tab){
  var tasks=state.tasks[tab]||{},total=0,overdue=0,soon=0,complete=0;
  var t=new Date();t.setHours(0,0,0,0);
  getTabBuckets(tab).forEach(function(b){
    flattenBucketTasks(tab,b).forEach(function(ref){
      var tk=ref.task;
      total++;
      if(tk.status==='Complete')complete++;
      if(tk.due){var d=parseDue(tk.due),diff=Math.floor((d-t)/86400000);if(diff<0)overdue++;else if(diff<=7)soon++;}
    });
  });
  return {total:total,overdue:overdue,soon:soon,complete:complete};
}

function getTaskRef(id,bucket,parentId){
  var arr=((state.tasks[state.activeTab]||{})[bucket]||[]);
  for(var i=0;i<arr.length;i++){
    if(parentId){
      if(arr[i].id===parentId){
        var subs=arr[i].subtasks||[];
        for(var j=0;j<subs.length;j++){if(subs[j].id===id)return {task:subs[j],arr:subs,index:j,parent:arr[i],parentId:parentId};}
      }
    }else if(arr[i].id===id){
      if(!arr[i].subtasks)arr[i].subtasks=[];
      return {task:arr[i],arr:arr,index:i,parent:null,parentId:null};
    }
  }
  return null;
}

function flattenBucketTasks(tab,bucket){
  var out=[];
  (((state.tasks[tab]||{})[bucket])||[]).forEach(function(t){
    if(!t.subtasks)t.subtasks=[];
    out.push({task:t,parent:null,parentId:null});
    (t.subtasks||[]).forEach(function(st){out.push({task:st,parent:t,parentId:t.id});});
  });
  return out;
}

function taskMatchesMainFilters(t){
  if(t.status==='Complete'&&!showCompleted[state.activeTab]&&!curFilter) return false;
  var q=curSearch.toLowerCase();
  var mq=!q||[t.customer,t.notes,t.owner,t.support,t.status,t.meetingNotes,t.milestone].some(function(v){return String(v||'').toLowerCase().indexOf(q)>-1;});
  return mq&&(!curFilter||t.status===curFilter)&&(!curPriFilter||t.priority===curPriFilter);
}

function taskHasMatchingSubtask(t){
  return (t.subtasks||[]).some(function(st){return taskMatchesMainFilters(st);});
}

function switchTab(t){state.activeTab=t;curSearch='';curFilter='';curPriFilter='';sortCol='';sortDir=1;renderApp();}
function setSort(col){if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=1;}renderApp();}
function sortTasks(arr){
  if(!sortCol)return arr;
  return arr.slice().sort(function(a,b){
    var av=a[sortCol]||'',bv=b[sortCol]||'';
    if(sortCol==='due'){av=av?parseDue(av).getTime():Infinity;bv=bv?parseDue(bv).getTime():Infinity;return sortDir*(av-bv);}
    if(sortCol==='priority')return sortDir*(priSort(av)-priSort(bv));
    return sortDir*String(av).localeCompare(String(bv));
  });
}

    if(c.type==='textarea')h+='<textarea class="form-textarea" id="tf_'+c.key+'" maxlength="2000">'+esc(val)+'</textarea>';
    else if(c.type==='status'){

      h+='</select>';
    }else if(c.type==='priority'){
      h+='<select class="form-select" id="tf_'+c.key+'"><option value="">— None —</option>';
      ['High','Medium','Low'].forEach(function(p){h+='<option'+(val===p?' selected':'')+'>'+p+'</option>';});

      h+='<input type="text" class="form-input" id="tf_'+c.key+'" value="'+esc(val)+'" placeholder="'+esc(c.label)+'">';

  });

function openAddTask(bucket,parentId){

  var title='Add Task — '+bucket;
  if(editingParentTask){
    var pref=getTaskRef(editingParentTask,bucket,null);
    title='Add Subtask — '+(pref&&pref.task&&pref.task.customer?pref.task.customer:bucket);
  }
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('taskFormFields').innerHTML=buildTaskForm(state.activeTab,null);
  document.getElementById('taskModal').classList.add('open');
  getTabCols(state.activeTab).forEach(function(c){if(c.type==='ac')makeAC(document.getElementById('tf_'+c.key));});
}
function openEditTask(id,bucket,parentId){
  var ref=getTaskRef(id,bucket,parentId||null);
  if(!ref)return;
  editingTask=id;editingBucket=bucket;editingParentTask=parentId||null;
  document.getElementById('modalTitle').textContent=editingParentTask?'Edit Subtask':'Edit Task';
  document.getElementById('taskFormFields').innerHTML=buildTaskForm(state.activeTab,ref.task);
  document.getElementById('taskModal').classList.add('open');
  getTabCols(state.activeTab).forEach(function(c){if(c.type==='ac')makeAC(document.getElementById('tf_'+c.key));});
}
function saveTask(){
  var tab=state.activeTab,cols=getTabCols(tab),isNew=!editingTask;
  var existing=null,ref=null;
  if(!isNew){ref=getTaskRef(editingTask,editingBucket,editingParentTask);if(ref)existing=ref.task;}
  var createdAt=nowTs();
  var task={id:editingTask||uid(),changelog:existing?(existing.changelog||[]):[{t:createdAt,ts:createdAt,msg:(currentUser?currentUser+' created '+(editingParentTask?'subtask':'task'):(editingParentTask?'Subtask created':'Task created')) }],completedAt:existing?existing.completedAt:null};
  if(!editingParentTask)task.subtasks=existing?(existing.subtasks||[]):[];
  // Saving a task resolves any prior sync conflict flags for that task.
  var changes=[], changedFields=[];
  cols.forEach(function(c){
    if(!c.visible)return;
    var el=document.getElementById('tf_'+c.key);
    if(el){
      var nv=el.value.trim();
      task[c.key]=nv;
      if(!isNew&&existing&&String(existing[c.key]||'')!==nv){
        changes.push(c.label+' updated');
        changedFields.push(c.key);
      }
    }
  });
  if(existing&&existing.conflict){delete task.conflict;delete task.conflictFields;}
  if(!isNew&&changes.length){
    var changedAt=nowTs();
    task.changelog.push({t:changedAt,ts:changedAt,fields:changedFields,msg:(currentUser?currentUser+': ':'')+changes.join(', ')});
  }
  // Track when task was completed
  if(task.status==='Complete'&&(!existing||existing.status!=='Complete')){
    task.completedAt=nowTs();
  } else if(task.status!=='Complete'){
    task.completedAt=null;
  } else if(existing){
    task.completedAt=existing.completedAt||null;
  }
  if(task.changelog.length>20)task.changelog=task.changelog.slice(-20);
  ensureTab(tab);
  if(isNew){
    if(editingParentTask){
      var pref=getTaskRef(editingParentTask,editingBucket,null);
      if(!pref)return showToast('Parent task not found.');
      if(!pref.task.subtasks)pref.task.subtasks=[];
      pref.task.subtasks.push(task);
      pref.task.changelog=pref.task.changelog||[];
      pref.task.changelog.push({t:nowTs(),ts:nowTs(),msg:(currentUser?currentUser+': ':'')+'Subtask added'});
    }else{
      state.tasks[tab][editingBucket].push(task);
    }
  }
  else if(ref){ref.arr[ref.index]=task;}
  persist();closeModal('taskModal');renderApp();showToast(isNew?(editingParentTask?'Subtask added.':'Task added.'):(editingParentTask?'Subtask updated.':'Task updated.'));
}
function deleteTask(id,bucket,parentId){
  var ref=getTaskRef(id,bucket,parentId||null);
  if(!ref)return;
  var label=parentId?'subtask':'task';
  var extra=(!parentId&&ref.task.subtasks&&ref.task.subtasks.length)?' and its '+ref.task.subtasks.length+' subtask(s)':'';
  if(!confirm('Delete this '+label+extra+'?'))return;
  logAuditEvent(parentId?'Subtask deleted':'Task deleted', ref.task.customer||'(untitled)', state.activeTab, 'From section "'+bucket+'"'+((!parentId&&ref.task.subtasks&&ref.task.subtasks.length)?'; included '+ref.task.subtasks.length+' subtask(s).':''));
  ref.arr.splice(ref.index,1);
  persist();renderApp();showToast(parentId?'Subtask deleted.':'Task deleted.');
}
function showHistory(id,bucket,parentId){
  var ref=getTaskRef(id,bucket,parentId||null);

  document.getElementById('histModal').classList.add('open');

function renderMyTasks(){

      list.innerHTML='';acIdx=-1;

      names.slice(0,8).forEach(function(name){
        var item=document.createElement('div');item.className='ac-item';item.textContent=name;
        item.addEventListener('mousedown',function(e){e.preventDefault();inp.value=name;myTasksName=name;list.style.display='none';inp.focus();updateMyTasksTable();});
        list.appendChild(item);
      });
      list.style.display='block';
    }

      var q=inp.value.trim().toLowerCase();
      if(q.length<1){list.style.display='none';return;}
      showList(getKnownNames().filter(function(n){return n.toLowerCase().indexOf(q)>-1&&n.toLowerCase()!==q;}));
    });
    inp.addEventListener('keydown',function(e){
      var items=list.querySelectorAll('.ac-item');if(!items.length)return;
      if(e.key==='ArrowDown'){e.preventDefault();acIdx=Math.min(acIdx+1,items.length-1);items.forEach(function(el,i){el.classList.toggle('sel',i===acIdx);});}
      else if(e.key==='ArrowUp'){e.preventDefault();acIdx=Math.max(acIdx-1,0);items.forEach(function(el,i){el.classList.toggle('sel',i===acIdx);});}
      else if(e.key==='Enter'&&acIdx>=0){e.preventDefault();inp.value=items[acIdx].textContent;myTasksName=inp.value;list.style.display='none';inp.focus();updateMyTasksTable();}
      else if(e.key==='Escape'){list.style.display='none';}
    });
    inp.addEventListener('blur',function(){setTimeout(function(){list.style.display='none';},200);});
  }
  if(myTasksName)updateMyTasksTable();
}
function updateMyTasksTable(){
  var q=myTasksName.trim().toLowerCase();
  var tableEl=document.getElementById('myTasksTable'),countEl=document.getElementById('myTasksCount');
  if(!tableEl)return;
  if(!q){tableEl.innerHTML='<div class="empty-state">Enter a name above to see all their tasks across every PM tab.</div>';if(countEl)countEl.textContent='';return;}
  var results=[];
  state.tabs.forEach(function(tab){
    getTabBuckets(tab).forEach(function(bucket){
      ((state.tasks[tab]||{})[bucket]||[]).forEach(function(t){
        var om=(t.owner||'').toLowerCase().indexOf(q)>-1;
        var sm=(t.support||'').toLowerCase().indexOf(q)>-1;
        if(om||sm)results.push({pm:tab,bucket:bucket,task:t,role:om?'Owner':'Supporting'});
      });
    });
  });
  if(countEl)countEl.textContent=results.length+' task'+(results.length!==1?'s':'');
  if(!results.length){tableEl.innerHTML='<div class="empty-state">No tasks found for "'+esc(myTasksName)+'".</div>';return;}
  var h='<table class="dash-table"><thead><tr><th>PM Tab</th><th>Bucket</th><th>Customer</th><th>Role</th><th>Owner</th><th>Supporting</th><th>Priority</th><th>Status</th><th>Due</th></tr></thead><tbody>';
  results.forEach(function(r){
    var t=r.task;

    h+='<td><span style="font-size:11px;font-weight:700;color:'+(r.role==='Owner'?'var(--gig)':'var(--blue)')+'">'+esc(r.role)+'</span></td>';
    h+='<td>'+(t.owner?'<span class="owner-chip">'+esc(t.owner)+'</span>':'<span style="color:var(--txl)">—</span>')+'</td>';
    h+='<td>'+(t.support?'<span class="support-chip">'+esc(t.support)+'</span>':'<span style="color:var(--txl)">—</span>')+'</td>';
    h+='<td>'+priTag(t.priority)+'</td><td>'+statusPill(t.status)+'</td><td>'+dueBadge(t.due)+'</td></tr>';
  });
  tableEl.innerHTML=h+'</tbody></table>';

function exportCSV(tab){

  var rows=[['Bucket','Task Type','Parent Task'].concat(cols.map(function(c){return c.label;}))];
  getTabBuckets(tab).forEach(function(b){
    (state.tasks[tab][b]||[]).forEach(function(t){
      var row=[b,'Task',''];cols.forEach(function(c){row.push(String(t[c.key]||'').replace(/\n/g,' '));});rows.push(row);
      (t.subtasks||[]).forEach(function(st){var srow=[b,'Subtask',t.customer||''];cols.forEach(function(c){srow.push(String(st[c.key]||'').replace(/\n/g,' '));});rows.push(srow);});

function renameTab(){

function toggleColVis(tab,idx,val){if(!state.tabCols[tab])state.tabCols[tab]=JSON.parse(JSON.stringify(getTabCols(tab)));state.tabCols[tab][idx].visible=val;persist();}
function addCustomCol(tab){
  var name=document.getElementById('newColName').value.trim(),type=document.getElementById('newColType').value;
  if(!name){alert('Column name required.');return;}
  if(!state.tabCols[tab])state.tabCols[tab]=JSON.parse(JSON.stringify(getTabCols(tab)));
  state.tabCols[tab].push({key:'c_'+uid(),label:name,type:type,visible:true,custom:true});
  persist();renderCfgBody(tab);
}
function removeCustomCol(tab,idx){
  if(!state.tabCols[tab])state.tabCols[tab]=JSON.parse(JSON.stringify(getTabCols(tab)));
  var removed=state.tabCols[tab][idx];
  state.tabCols[tab].splice(idx,1);
  logAuditEvent('Column deleted', removed?removed.label:'Column', tab, 'Deleted from Configure.');
  persist();renderCfgBody(tab);
}
function resetCols(tab){if(!confirm('Reset columns to global defaults?'))return;delete state.tabCols[tab];persist();renderCfgBody(tab);showToast('Columns reset.');}
function addBucket(tab){
  var name=document.getElementById('newBucketName').value.trim();if(!name){alert('Section name required.');return;}
  if(!state.tabBuckets[tab])state.tabBuckets[tab]=getTabBuckets(tab).slice();
  if(state.tabBuckets[tab].indexOf(name)!==-1){alert('Already exists.');return;}
  state.tabBuckets[tab].push(name);ensureTab(tab);persist();renderCfgBody(tab);showToast('Section added.');
}
function moveBucket(tab,bucket,dir){
  if(!state.tabBuckets[tab])state.tabBuckets[tab]=getTabBuckets(tab).slice();
  var arr=state.tabBuckets[tab],idx=arr.indexOf(bucket),next=idx+dir;
  if(idx<0||next<0||next>=arr.length)return;
  var tmp=arr[idx];arr[idx]=arr[next];arr[next]=tmp;
  persist();renderCfgBody(tab);renderApp();showToast('Section order updated.');
}
function wireSectionDrag(tab){
  var list=document.getElementById('sectionOrderList');if(!list)return;
  var dragName=null;
  list.querySelectorAll('[data-section-row]').forEach(function(row){
    row.addEventListener('dragstart',function(e){dragName=this.getAttribute('data-section-row');this.classList.add('dragging');try{e.dataTransfer.setData('text/plain',dragName);}catch(_e){};});
    row.addEventListener('dragend',function(){this.classList.remove('dragging');dragName=null;});
    row.addEventListener('dragover',function(e){e.preventDefault();});
    row.addEventListener('drop',function(e){
      e.preventDefault();
      var from=dragName;try{from=e.dataTransfer.getData('text/plain')||from;}catch(_e){}
      var to=this.getAttribute('data-section-row');
      if(!from||!to||from===to)return;
      reorderBucketBefore(tab,from,to);
    });
  });
}
function reorderBucketBefore(tab,fromBucket,toBucket){
  if(!state.tabBuckets[tab])state.tabBuckets[tab]=getTabBuckets(tab).slice();
  var arr=state.tabBuckets[tab],from=arr.indexOf(fromBucket),to=arr.indexOf(toBucket);
  if(from<0||to<0||from===to)return;
  var moved=arr.splice(from,1)[0];
  to=arr.indexOf(toBucket);
  arr.splice(to,0,moved);
  persist();renderCfgBody(tab);renderApp();showToast('Section order updated.');
}
function removeBucket(tab,bucket){
  var tasks=(state.tasks[tab]||{})[bucket]||[];
  var msg='Delete section "'+bucket+'"?';
  if(tasks.length)msg+=' This will also delete '+tasks.length+' task(s) and any subtasks inside them.';
  if(!confirm(msg))return;
  if(!state.tabBuckets[tab])state.tabBuckets[tab]=getTabBuckets(tab).slice();
  state.tabBuckets[tab]=state.tabBuckets[tab].filter(function(b){return b!==bucket;});
  if(state.tasks[tab])delete state.tasks[tab][bucket];
  logAuditEvent('Section deleted', bucket, tab, tasks.length+' task(s) removed with this section.');
  persist();renderCfgBody(tab);renderApp();showToast('Section removed.');
}
function resetBuckets(tab){if(!confirm('Reset sections to global defaults? This will restore the default section list, but it will not recover tasks from deleted sections.'))return;delete state.tabBuckets[tab];persist();renderCfgBody(tab);renderApp();showToast('Sections reset.');}
function logAuditEvent(type,item,tab,detail){
  if(!state.auditLog)state.auditLog=[];
  state.auditLog.push({t:nowTs(),type:type,item:item||'',tab:tab||'',detail:detail||'',by:currentUser||'anonymous'});
  if(state.auditLog.length>300)state.auditLog=state.auditLog.slice(-300);
}

function logTabEvent(action, tabName) {
  if (!state.tabHistory) state.tabHistory = [];
  state.tabHistory.push({
    t: nowTs(),
    action: action,
    tab: tabName,
    by: currentUser || 'anonymous'
  });
  // Keep last 100 tab events
  if (state.tabHistory.length > 100) state.tabHistory = state.tabHistory.slice(-100);
}

function saveTab(){

  if(state.tabs.indexOf(name)!==-1){alert('Already exists.');return;}
  state.tabs.push(name);state.tasks[name]={};
  GLOBAL_BUCKETS.forEach(function(b){state.tasks[name][b]=[];});

function confirmDeleteTab(tab){
  if(state.tabs.length<=1){alert('Cannot remove the last tab.');return;}
  if(!confirm('Remove tab "'+tab+'" and ALL its tasks?'))return;
  logTabEvent('removed', tab);
  logAuditEvent('Tab deleted', tab, tab, 'Removed the tab and all tasks on it.');
  state.tabs=state.tabs.filter(function(t){return t!==tab;});
  delete state.tasks[tab];delete state.tabCols[tab];delete state.tabBuckets[tab];
  state.activeTab=state.tabs[0];persist();renderApp();showToast('Tab removed.');

    });
  });
  return all;
}

function buildCharts(all,today,allPMs){

function refreshDashTable(){
  var all=getAllTasks(),q=dashSearch.toLowerCase();

    var t=r.task;

    var mpm=!dashPM||r.pm===dashPM,mb=!dashBucket||r.bucket===dashBucket;
    var ms=!dashStatus||t.status===dashStatus,mp=!dashPri||t.priority===dashPri;
    var md=true;if(dashDue){var cl=dueClass(t.due);md=(dashDue==='na'?!t.due:cl===dashDue);}
    return mq&&mpm&&mb&&ms&&mp&&md;
  });
  var h='<table class="dash-table"><thead><tr><th>PM</th><th>Bucket</th><th>Customer</th><th>Owner</th><th>Supporting</th><th>Priority</th><th>Status</th><th>Due</th></tr></thead><tbody>';

function rptScopeChange(el){
  if(!el) return;
  var sel=document.getElementById('rpt-tab-select');
  if(sel) sel.style.display=(el.value==='select'?'flex':'none');
}

function collectReportConfig(){
  var scope=document.querySelector('input[name="rpt-scope"]:checked');
  var selectedTabs=[];
  document.querySelectorAll('.rpt-tab-cb').forEach(function(cb){if(cb.checked)selectedTabs.push(cb.value);});
  var priorities=[];
  document.querySelectorAll('.rpt-pri-cb').forEach(function(cb){if(cb.checked)priorities.push(cb.value);});
  var cfg={
    title:document.getElementById('rpt-title').value.trim()||'General Inspection Task Report',
    subtitle:document.getElementById('rpt-subtitle').value.trim(),
    scope:scope?scope.value:'all',
    selectedTabs:selectedTabs,
    includeStats:document.getElementById('rpt-stats').checked,
    includeCharts:document.getElementById('rpt-charts').checked,
    includeTables:document.getElementById('rpt-tables').checked,
    includeCompleted:document.getElementById('rpt-completed').checked,
    priorities:priorities,
    statuses:[]
  };
  saveReportDefaults(cfg);
  return cfg;
}

function generateReport(){
  var cfg=collectReportConfig();
  closeModal('reportModal');
  showToast('Generating report...');

  // Determine which tabs to include
  var tabs=cfg.scope==='all'?state.tabs.slice():cfg.selectedTabs.filter(function(t){return state.tabs.indexOf(t)>-1;});
  if(!tabs.length){showToast('No tabs selected.');return;}

  // Collect data
  var allTasks=[];
  tabs.forEach(function(tab){
    getTabBuckets(tab).forEach(function(bucket){
      ((state.tasks[tab]||{})[bucket]||[]).forEach(function(t){
        if(t.status==='Complete'&&!cfg.includeCompleted) return;
        if(cfg.priorities.length&&cfg.priorities.indexOf(t.priority)===-1) return;
        allTasks.push({pm:tab,bucket:bucket,task:t});
      });
    });
  });

  var today=new Date();today.setHours(0,0,0,0);
  var total=allTasks.length,overdue=0,soon=0,complete=0;
  allTasks.forEach(function(r){
    var t=r.task;
    if(t.status==='Complete') complete++;
    if(t.due){var d=parseDue(t.due),diff=Math.floor((d-today)/86400000);if(diff<0)overdue++;else if(diff<=7)soon++;}
  });

  // Build chart data
  var pmCounts={};tabs.forEach(function(t){pmCounts[t]=0;});
  allTasks.forEach(function(r){pmCounts[r.pm]=(pmCounts[r.pm]||0)+1;});
  var statusCounts={};
  allTasks.forEach(function(r){var s=r.task.status||'Unknown';statusCounts[s]=(statusCounts[s]||0)+1;});
  var pmDue={};
  tabs.forEach(function(t){pmDue[t]={overdue:0,soon:0,ok:0,na:0};});
  allTasks.forEach(function(r){
    var cl=dueClass(r.task.due);
    pmDue[r.pm][cl]=(pmDue[r.pm][cl]||0)+1;
  });

  // Build report HTML
  buildReportWindow(cfg,tabs,allTasks,total,overdue,soon,complete,pmCounts,statusCounts,pmDue,today);
}

function statusColor(s){
  var m={'Ongoing':'#1a4fbf','In Progress':'#1a4fbf','In Process':'#1a4fbf','Complete':'#1a6b2a','On Hold':'#6b3db5','Planned':'#8a6500','Pending':'#8a6500','Not Started':'#8a6500','Delayed':'#b93328','Waiting on Response':'#6b3db5','High Priority':'#b93328'};
  return m[s]||'#888';
}
function priColor(p){return p==='High'?'#b93328':p==='Medium'?'#8a6200':'#888';}
function dueColor(due,status){
  if(status==='Complete') return '#1a6b2a';
  if(!due) return '#888';
  var d=parseDue(due),t=new Date();t.setHours(0,0,0,0);
  var diff=Math.floor((d-t)/86400000);
  if(diff<0) return '#b93328';
  if(diff<=7) return '#8a6200';
  return '#1a6b2a';
}
function fmtDue(due){
  if(!due) return '—';
  return parseDue(due).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

        });

function closeModal(id){document.getElementById(id).classList.remove('open');if(id==='taskModal'){editingTask=null;editingBucket=null;editingParentTask=null;}}
function showToast(msg){var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(function(){el.classList.remove('show');},2500);}
['taskModal','tabModal','cfgModal','histModal'].forEach(function(id){
  document.getElementById(id).addEventListener('click',function(e){if(e.target.id===id)closeModal(id);});

// ── MOBILE ACTION MODE DETECTION ────────────────────────────────
// Use the mobile action sheet only for true mobile/tablet-style use.
// Windows touch-capable desktops often report maxTouchPoints, so do not
// treat touch capability alone as mobile.
function isMobileActionSheetMode() {
  var ua = navigator.userAgent || '';
  var mobileUA = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua);
  var coarsePointer = window.matchMedia ? window.matchMedia('(pointer: coarse)').matches : false;
  var noHover = window.matchMedia ? window.matchMedia('(hover: none)').matches : false;
  var narrowScreen = window.matchMedia ? window.matchMedia('(max-width: 900px)').matches : (window.innerWidth <= 900);
  return mobileUA || (narrowScreen && coarsePointer && noHover);
}

// ── ACTION SHEET (mobile) ─────────────────────────────────────────
var _asTaskId = null;
var _asBucket = null;
var _asParentId = null;

function openActionSheet(taskId, bucket, customerName, parentId) {
  _asTaskId = taskId;
  _asBucket = bucket;
  _asParentId = parentId || null;
  document.getElementById('actionSheetTitle').textContent = customerName || 'Task Actions';
  var subBtn = document.getElementById('actionSheetSubtaskBtn');
  if (subBtn) subBtn.style.display = parentId ? 'none' : 'flex';
  document.getElementById('actionSheet').classList.add('open');
}
function closeActionSheet() {
  document.getElementById('actionSheet').classList.remove('open');
  _asTaskId = null; _asBucket = null; _asParentId = null;
}
function actionSheetSubtask() {
  var taskId = _asTaskId;
  var bucket = _asBucket;
  var parentId = _asParentId;
  closeActionSheet();
  if (taskId && bucket && !parentId) openAddTask(bucket, taskId);
}
function actionSheetEdit() {
  var taskId = _asTaskId;
  var bucket = _asBucket;
  var parentId = _asParentId;
  closeActionSheet();
  if (taskId && bucket) openEditTask(taskId, bucket, parentId);
}
function actionSheetHistory() {
  var taskId = _asTaskId;
  var bucket = _asBucket;
  var parentId = _asParentId;
  closeActionSheet();
  if (taskId && bucket) showHistory(taskId, bucket, parentId);
}
function actionSheetDelete() {
  var taskId = _asTaskId;
  var bucket = _asBucket;
  var parentId = _asParentId;
  closeActionSheet();
  if (taskId && bucket) deleteTask(taskId, bucket, parentId);
}

// ── WIRE ROW INTERACTIONS after renderApp ─────────────────────────
function wireRowInteractions() {
  var rows = document.querySelectorAll('.task-table tbody tr[data-task-id]');
  rows.forEach(function(row) {
    var taskId = row.getAttribute('data-task-id');
    var bucket = row.getAttribute('data-bucket');
    var customer = row.getAttribute('data-customer');
    var parentId = row.getAttribute('data-parent-id') || null;
    if (!taskId || !bucket) return;

    // Single tap opens the action sheet only on true mobile/tablet layouts.
    row.addEventListener('click', function(e) {
      if (!isMobileActionSheetMode()) return;
      if (e.target.closest('[data-action]') || e.target.closest('.row-acts')) return;
      openActionSheet(taskId, bucket, customer, parentId);
    });

    // Desktop and hybrid Windows devices keep the safer double-click edit behavior.
    row.addEventListener('dblclick', function(e) {
      if (isMobileActionSheetMode()) return;
      if (e.target.closest('[data-action]') || e.target.closest('.row-acts')) return;
      openEditTask(taskId, bucket, parentId);
    });
  });
}

['taskModal','tabModal','cfgModal','histModal','reportModal','userModal'].forEach(function(id) {
  var el = document.getElementById(id);
  if (el) el.addEventListener('click', function(e) { if (e.target.id === id) closeModal(id); });
});
